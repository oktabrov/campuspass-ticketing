<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPass — Event Tickets</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">🎫 CampusPass</div>
        <nav>
            <button class="nav-btn active" data-view="events">Events</button>
            <button class="nav-btn" data-view="bookings">My Bookings</button>
        </nav>
    </div>
</header>

<main>
    <!-- Events View -->
    <section id="view-events" class="view active">
        <div class="page-title">
            <h1>Upcoming Events</h1>
            <p class="subtitle">Book your spot at the hottest campus events</p>
        </div>
        <div id="events-grid" class="events-grid">
            <div class="loading-placeholder">Loading events...</div>
        </div>
    </section>

    <!-- Bookings View -->
    <section id="view-bookings" class="view">
        <div class="page-title">
            <h1>My Bookings</h1>
            <p class="subtitle">Your confirmed reservations</p>
        </div>
        <div id="bookings-list" class="bookings-list">
            <div class="empty-state">
                <span class="empty-icon">📋</span>
                <p>No bookings yet. Go book some events!</p>
            </div>
        </div>
    </section>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>
</main>

<footer>
    <div class="footer-inner">
        <div class="module-status" id="module-status"></div>
    </div>
</footer>

<script src="/static/js/app.js"></script>
</body>
</html>
